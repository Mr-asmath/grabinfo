name: Django CI & Multi-System Testing + Deploy

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          pip install flake8 coverage
      - name: Run Linting
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

  test-ubuntu:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install Django==5.0.7 django-jazzmin Pillow psycopg2-binary
      - name: Run migrations check
        run: |
          python manage.py makemigrations --check --dry-run
      - name: Run tests
        run: |
          python manage.py test

  test-windows:
    runs-on: windows-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install Django==5.0.7 django-jazzmin Pillow psycopg2-binary
      - name: Run migrations check
        run: |
          python manage.py makemigrations --check --dry-run
      - name: Run tests
        run: |
          python manage.py test

  test-macos:
    runs-on: macos-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install Django==5.0.7 django-jazzmin Pillow psycopg2-binary
      - name: Run migrations check
        run: |
          python manage.py makemigrations --check --dry-run
      - name: Run tests
        run: |
          python manage.py test

  dev-server:
    runs-on: ubuntu-latest
    needs: [test-ubuntu, test-windows, test-macos]
    if: success()
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install Django==5.0.7 django-jazzmin Pillow psycopg2-binary
      - name: Setup database
        run: |
          python manage.py migrate
      - name: Run development server
        run: |
          echo "Starting Django development server..."
          timeout 30 python manage.py runserver 0.0.0.0:8000 || true
          echo "Server startup completed"
        env:
          DEBUG: "True"

  deploy-to-render:
    runs-on: ubuntu-latest
    needs: dev-server
    if: github.ref == 'refs/heads/main' && success()
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Deploy to Render
        run: |
          echo "Deploying to Render..."
          curl https://api.render.com/deploy/${{ secrets.RENDER_SERVICE_ID }}?key=${{ secrets.RENDER_API_KEY }}
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}

  deploy-to-railway:
    runs-on: ubuntu-latest
    needs: dev-server
    if: github.ref == 'refs/heads/main' && success()
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Deploy to Railway
        run: |
          echo "Deploying to Railway..."
          npm install -g @railway/cli
          railway link ${{ secrets.RAILWAY_PROJECT_ID }}
          railway up
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}