name: Django CI

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    
    strategy:
      max-parallel: 4
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install Django==5.0.7 django-jazzmin Pillow psycopg2-binary
    
    - name: Run migrations
      run: |
        python manage.py migrate
    
    - name: Run tests
      run: |
        python manage.py test
      env:
        DEBUG: "True"
    
    - name: Check migrations
      run: |
        python manage.py makemigrations --check --dry-run

  run-server:
    runs-on: ubuntu-latest
    needs: test  # Only run if tests pass
    if: github.event_name == 'workflow_dispatch'  # Only run when manually triggered
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install Django==5.0.7 django-jazzmin Pillow psycopg2-binary
    
    - name: Run migrations
      run: |
        python manage.py migrate
    
    - name: Start Django development server
      run: |
        python manage.py runserver 0.0.0.0:8000 &
        sleep 5
        curl --fail http://localhost:8000/ || exit 1
      env:
        DEBUG: "True"
    
    - name: Stop server
      run: |
        pkill -f "python manage.py runserver" || true
