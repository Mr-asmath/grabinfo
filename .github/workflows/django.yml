name: Django CI

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # Allows manual triggering

jobs:
  test:
    runs-on: ubuntu-latest
    
    strategy:
      max-parallel: 4
      matrix:
        python-version: [3.10, 3.11, 3.12]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install Django==5.0.7 django-jazzmin Pillow psycopg2-binary
        pip install flake8 pytest pytest-django  # Optional: for linting and better testing
    
    - name: Run flake8 linting (optional)
      run: |
        pip install flake8
        # Stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # Exit-zero treats all errors as warnings
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
    
    - name: Check migrations
      run: |
        python manage.py makemigrations --check --dry-run
    
    - name: Run tests
      run: |
        python manage.py test
      env:
        DEBUG: "True"
        # Use SQLite for GitHub Actions (faster, no setup needed)
        # Or optionally use PostgreSQL:
        # USE_POSTGRES: "0"  # Forces SQLite
    
    - name: Check static files (optional)
      run: |
        python manage.py collectstatic --noinput --dry-run

  # Optional: Build and test with PostgreSQL
  test-postgres:
    runs-on: ubuntu-latest
    needs: test  # Runs after SQLite tests
    if: false  # Disable by default, enable if you want PostgreSQL tests
    
    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_DB: grab_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install Django==5.0.7 django-jazzmin Pillow psycopg2-binary
    
    - name: Run PostgreSQL tests
      run: |
        python manage.py test
      env:
        USE_POSTGRES: "1"
        POSTGRES_DB: grab_test
        POSTGRES_USER: postgres
        POSTGRES_PASSWORD: postgres
        POSTGRES_HOST: localhost
        POSTGRES_PORT: 5432
